<!DOCTYPE html>
<html lang="en" class="h-full">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PrivaFile — Secure File Encryption</title>
    <!-- Inter Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        'neutral-dark': '#0a0a0a',
                        'neutral-surface': '#171717',
                        'neutral-border': '#262626',
                        'neutral-title': '#fafafa',
                        'neutral-body': '#a3a3a3',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #0a0a0a;
            color: #a3a3a3;
            -webkit-font-smoothing: antialiased;
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: #0a0a0a;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #262626;
            border-radius: 10px;
        }
    </style>
</head>

<body class="h-full font-sans selection:bg-neutral-title selection:text-neutral-dark overflow-hidden">
    <div class="h-full flex flex-col">
        <!-- Top Bar -->
        <header
            class="h-12 border-b border-neutral-border bg-neutral-dark flex items-center px-6 justify-between shrink-0">
            <div class="flex items-center space-x-3">
                <div class="flex items-center justify-center w-6 h-6 rounded bg-neutral-title">
                    <i data-lucide="lock" class="w-3.5 h-3.5 text-neutral-dark"></i>
                </div>
                <h1 class="text-[11px] font-extrabold uppercase tracking-[0.2em] text-neutral-title">PrivaFile</h1>
            </div>
            <div class="flex items-center space-x-4">
                <div class="flex items-center space-x-2">
                    <span class="h-1.5 w-1.5 rounded-full bg-green-500 shadow-[0_0_8px_rgba(34,197,94,0.4)]"></span>
                    <span class="text-[10px] uppercase tracking-widest font-semibold text-neutral-body">Ready</span>
                </div>
            </div>
        </header>

        <div class="flex-1 flex overflow-hidden">
            <!-- Sidebar -->
            <nav
                class="w-16 border-r border-neutral-border bg-neutral-dark flex flex-col items-center py-6 space-y-8 shrink-0">
                <button
                    class="flex items-center justify-center w-10 h-10 rounded-lg bg-neutral-surface border border-neutral-border text-neutral-title transition-all hover:border-neutral-body/30"
                    title="Encrypt/Decrypt">
                    <i data-lucide="shield" class="w-5 h-5"></i>
                </button>
                <button
                    class="flex items-center justify-center w-10 h-10 rounded-lg text-neutral-body transition-all hover:bg-neutral-surface hover:text-neutral-title"
                    title="Archive">
                    <i data-lucide="box" class="w-5 h-5"></i>
                </button>
                <div class="mt-auto flex flex-col items-center space-y-6">
                    <button class="text-neutral-body hover:text-neutral-title transition-colors" title="Settings">
                        <i data-lucide="settings" class="w-4 h-4"></i>
                    </button>
                </div>
            </nav>

            <!-- Main Content Area -->
            <main class="flex-1 overflow-auto custom-scrollbar bg-neutral-dark flex items-center justify-center p-12">
                <div class="w-full max-w-lg">
                    <div class="mb-12 text-center">
                        <h2 class="text-3xl font-bold tracking-tight text-neutral-title mb-4">Secure Encryption</h2>
                        <p class="text-sm text-neutral-body leading-relaxed max-w-sm mx-auto">
                            Local-first tool for professional file protection. No data ever leaves your device.
                        </p>
                    </div>

                    <div class="bg-neutral-surface border border-neutral-border rounded-xl p-10 space-y-10 shadow-2xl">
                        <!-- File Selection Section -->
                        <div class="space-y-3">
                            <label
                                class="text-[10px] uppercase tracking-[0.15em] font-bold text-neutral-body block">Target
                                File</label>
                            <div class="flex gap-2">
                                <input type="text" id="selectedFile" readonly
                                    class="flex-1 bg-neutral-dark border border-neutral-border rounded-lg px-4 py-3 text-xs text-neutral-body focus:outline-none placeholder:text-neutral-body/30"
                                    placeholder="No source selected...">
                                <button onclick="selectFile()"
                                    class="bg-neutral-border hover:bg-neutral-body/20 text-neutral-title px-6 py-3 rounded-lg text-[10px] uppercase font-bold tracking-widest transition-all">
                                    Browse
                                </button>
                            </div>
                        </div>

                        <!-- Password Input Section -->
                        <div class="space-y-3">
                            <div class="flex justify-between items-center">
                                <label
                                    class="text-[10px] uppercase tracking-[0.15em] font-bold text-neutral-body">Passphrase</label>
                                <button onclick="togglePasswordVisibility()"
                                    class="text-[10px] uppercase tracking-widest font-bold text-neutral-body hover:text-neutral-title flex items-center transition-colors">
                                    <i data-lucide="eye" class="w-3 h-3 mr-1.5 pt-0.5"></i>
                                    Show
                                </button>
                            </div>
                            <input type="password" id="password"
                                class="w-full bg-neutral-dark border border-neutral-border rounded-lg px-4 py-3 text-sm text-neutral-title focus:border-neutral-body/50 transition-colors focus:outline-none placeholder:text-neutral-body/20"
                                placeholder="••••••••••••••••">
                        </div>

                        <!-- Action Buttons -->
                        <div class="flex gap-4 pt-4">
                            <button onclick="encryptFile()"
                                class="flex-1 bg-neutral-title text-neutral-dark py-4 rounded-lg text-[11px] uppercase font-black tracking-[0.2em] hover:opacity-90 transition-all active:scale-[0.98]">
                                Encrypt
                            </button>
                            <button onclick="decryptFile()"
                                class="flex-1 border border-neutral-border text-neutral-title py-4 rounded-lg text-[11px] uppercase font-black tracking-[0.2em] bg-neutral-surface hover:bg-neutral-border/30 transition-all active:scale-[0.98]">
                                Decrypt
                            </button>
                        </div>
                    </div>

                    <!-- System Status Tooltip-style info -->
                    <div id="status" class="mt-10 flex flex-col items-center justify-center space-y-4">
                        <div
                            class="inline-flex items-center space-x-3 px-4 py-2 rounded-full border border-neutral-border bg-neutral-surface text-[10px] font-medium tracking-tight">
                            <i data-lucide="info" class="w-3.5 h-3.5 text-neutral-body"></i>
                            <p class="text-neutral-body">Ready to process requests</p>
                        </div>
                    </div>
                </div>
            </main>
        </div>

        <!-- Footnote Status Bar -->
        <footer
            class="h-8 border-t border-neutral-border bg-neutral-dark flex items-center px-6 justify-between text-[10px] text-neutral-body shrink-0 font-medium tracking-tight">
            <div class="flex items-center space-x-4">
                <span class="uppercase tracking-widest">PrivaFile v1.1.0</span>
                <span class="opacity-30">|</span>
                <span id="file-info" class="truncate max-w-[200px]">No document loaded</span>
            </div>
            <div class="flex items-center space-x-6">
                <span>LOCAL-FIRST ENCRYPTION</span>
                <span id="encryption-status" class="flex items-center">
                    <span class="h-1.5 w-1.5 rounded-full bg-green-500 mr-2"></span>
                    <span class="text-neutral-title uppercase tracking-tighter">SECURE</span>
                </span>
            </div>
        </footer>
    </div>

    <!-- Scripts -->
    <script src="../dist/renderer.js"></script>
    <script>
        // Initialize Lucide icons
        lucide.createIcons();

        // Password visibility toggle helper
        function togglePasswordVisibility() {
            const passwordInput = document.getElementById('password');
            const eyeBtn = document.querySelector('[onclick="togglePasswordVisibility()"]');
            const eyeIcon = eyeBtn.querySelector('i');
            const textNode = eyeBtn.lastChild;

            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                eyeIcon.setAttribute('data-lucide', 'eye-off');
                textNode.textContent = ' Hide';
            } else {
                passwordInput.type = 'password';
                eyeIcon.setAttribute('data-lucide', 'eye');
                textNode.textContent = ' Show';
            }
            lucide.createIcons();
        }
    </script>
</body>

</html>
